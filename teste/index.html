<!DOCTYPE  html>
<html lang="pt-br">   
        
    <head> 
        <meta charset="UTF-8">
        <title>Teste</title>
        <link rel="stylesheet" href="style.css">
        <script src="javascript.js" defer></script> 
    </head>
    <body>
        <header>
            <section class="cabecalho">            
                <h1>Aprenda junto comigo JavaScript</h1>
                <h2 id="relogio">00:00:00</h2>
        </section>
        </header>
        
       
            <div class="centro">
                <div class="secao">
                    <p> 
                        <button id="meuBotao">Botao 1 - Sobre mim</button>
                    </p>
                </div>

               <div class="secao">
                    <p> 
                        <button id="meuTextoBotao">Botao 2 - Texto</button>
                    </p>
                </div>
                
                <div class="secao"> 
                    <p> 
                        <button id="meuContador" >Botao 2 - Contador</button>
                    </p>
                </div>
               
                    <div class="secao">
                        <p id="resultadoIdade">Digite sua idade</p>
                            <input type="text" id="idade" placeholder="Ex: 18 anos"> <br>
                            <button id="botaoIdade">Validar maioridade</button><br>
                           </div>
               <div class="secao">
                 <button id="botaoToggle">Mostrar/Ocultar Texto</button>            
                        <p id="textoToggle" style="display: none;">Esse é um texto escondido!</p>
                    </div>
               

                 <div class="secao">
                        <p>Digite sua nota da P1</p>
                            <input type="text" id="nota1"size="5"> <br>                
                        <p>Digite sua nota da P2</p>
                            <input type="text" id="nota2" size="5"> <br>              
                        <div class="botoesMedia"><br>
                            <button id="botaoMedia">Gerar Média</button>
                            <button id="botaoLimpar">Limpar</button>
                        </div> 
                </div>
              

                    <div class="secao">
                         <h3>CheckList</h3>
                            <ul>
                            <li><input type="checkbox" onchange="checkVerde(this)" >Estudar JavaScript</li>
                            <li><input type="checkbox" onchange="checkVerde(this)">Fazer exercício de HTML</li>
                            <li><input type="checkbox" onchange="checkVerde(this)">Criar um mini projeto</li>
                            <li><input type="checkbox" onchange="checkVerde(this)">Ir para academia</li>
                            <li><input type="checkbox" onchange="checkVerde(this)">Fazer compras</li>
                            <li><input type="checkbox" onchange="checkVerde(this)">Comer Japonês</li>
                            </ul>
                    </div>
        </div>
    </body>
</html>
